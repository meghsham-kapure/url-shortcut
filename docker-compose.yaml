services:
  postgres-db-service:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: maverickPgAdmin
      POSTGRES_PASSWORD: SuperMaverick
      POSTGRES_DB: url_shortcut_pg_db
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
